# Basic site settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Xun Tang"
title_separator          : "-"
name                     : &name "Xun Tang"
description              : &description "Personal academic website of Xun Tang, Assistant Professor of Mathematics at HKUST."
url                      : "https://xun-tang123.github.io"
baseurl                  : "/Xun_lab_website"
repository               : "Xun-Tang123/Xun_lab_website"

# Sidebar profile
author:
  avatar           : "profile.jpg"
  name             : "Xun Tang"
  bio              : "Assistant Professor of Mathematics"
  location         : "Hong Kong"
  employer         : "HKUST"
  email            : "xuntang@ust.hk"
  googlescholar    : "https://scholar.google.com/citations?user=JWCEctAAAAAJ&hl=en"
  github           : "Xun-Tang123"

# Site behavior
breadcrumbs              : false
words_per_minute         : 160
future                   : false
read_more                : "disabled"
comments:
  provider               :
atom_feed:
  hide                   : true

# SEO and social profiles
og_image                 : "profile.jpg"
og_description           : *description
social:
  type                   : "Person"
  name                   : *name
  links:
    - "https://scholar.google.com/citations?user=JWCEctAAAAAJ&hl=en"
    - "https://github.com/Xun-Tang123"

analytics:
  provider               : "false"

# Files read by Jekyll
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .jekyll-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - local
  - log
  - node_modules
  - package.json
  - package-lock.json
  - README.md
  - tmp
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Page defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass and output
sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: Asia/Hong_Kong

# GitHub Pages-compatible plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# HTML compression
compress_html:
  clippings: all
  ignore:
    envs: development
